<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Terremotos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Calculadora de Terremotos</h1>

    <label for="amplitude">Amplitude A (mm):</label>
    <input type="number" id="amplitude" step="any" placeholder="Ex: 5.2">

    <label for="deltaT">Delta T (s):</label>
    <input type="number" id="deltaT" step="any" placeholder="Ex: 2.5">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
  </div>

  <script>
    const E0 = 7e-3;

    function magnitude(a, deltaT) {
      return Math.log10(a) + 3.0 * Math.log10(8.0 * deltaT) - 2.92;
    }

    function energia(m) {
      return E0 * Math.pow(10, 1.5 * m);
    }

    function alerta(m) {
      if (m >= 8.0) {
        return {msg: "[!!!] TERREMOTO ENORME (Danos severos a longas distâncias)", classe: "forte"};
      } else if (m >= 7.0) {
        return {msg: "[!! ] GRANDE TERREMOTO (Altamente destrutivo)", classe: "forte"};
      } else if (m >= 6.1) {
        return {msg: "[ ! ] TERREMOTO (Destrutivo até 100 km do epicentro)", classe: "medio"};
      } else if (m >= 5.5) {
        return {msg: "[ * ] TERREMOTO (Danos prováveis)", classe: "medio"};
      } else if (m >= 3.5) {
        return {msg: "[ ~ ] Terremoto Registrado (Sem danos)", classe: "leve"};
      } else {
        return {msg: "[OK] Registrado (não sentido)", classe: "baixo"};
      }
    }

    function calcular() {
      const a = parseFloat(document.getElementById("amplitude").value);
      const deltaT = parseFloat(document.getElementById("deltaT").value);
      const divResultado = document.getElementById("resultado");

      if (isNaN(a) || isNaN(deltaT) || a <= 0 || deltaT <= 0) {
        divResultado.innerHTML = "<p style='color:red'>Informe valores válidos!</p>";
        return;
      }

      const m = magnitude(a, deltaT);
      const e = energia(m);
      const info = alerta(m);

      divResultado.innerHTML = `
        <p><b>Magnitude:</b> ${m.toFixed(3)}</p>
        <p><b>Energia:</b> ${e.toExponential(5)} J</p>
        <p class="alerta ${info.classe}">${info.msg}</p>
      `;
    }
  </script>
</body>
</html>
